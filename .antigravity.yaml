# .antigravity.yaml (範例)
runtime:
  image: "your-base-image"
  env:
    - name: JAVA_HOME
      value: "/usr/local/lib/graalvm/graalvm-jdk-21"
    - name: GRAALVM_HOME
      value: "/usr/local/lib/graalvm/graalvm-jdk-21"
    - name: GRADLE_HOME
      value: /opt/gradle
    - name: PATH
      value: "$JAVA_HOME/bin:$GRADLE_HOME/bin:$PATH"